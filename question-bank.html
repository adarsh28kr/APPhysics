<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Physics C — Question Bank</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f5f5f5; --card: #ffffff; --text: #1a1a1a;
            --text-secondary: #555; --border: #ddd; --primary: #2563eb;
            --success: #16a34a; --danger: #dc2626; --warning: #f59e0b;
            --unanswered: #e5e7eb; --answered: #2563eb; --flagged: #f59e0b;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e; --card: #16213e; --text: #e0e0e0;
            --text-secondary: #aaa; --border: #333; --primary: #4f8cff;
            --unanswered: #2a2a4a; --answered: #4f8cff;
        }
        body { font-family: 'Georgia', serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { color: var(--text-secondary); margin-bottom: 25px; font-size: 0.95rem; }
        .nav-links { margin-bottom: 20px; font-size: 0.85rem; }
        .nav-links a { color: var(--primary); text-decoration: none; margin-right: 15px; }
        /* Setup */
        .setup-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .setup-card h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--primary); }
        .topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        @media (max-width: 500px) { .topic-grid { grid-template-columns: 1fr; } }
        .topic-option {
            padding: 14px 16px; border: 2px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 10px;
        }
        .topic-option:hover { border-color: var(--primary); }
        .topic-option.selected { border-color: var(--primary); background: rgba(37,99,235,0.1); }
        .topic-option input { margin: 0; }
        .topic-count { font-size: 0.8rem; color: var(--text-secondary); margin-left: auto; }
        .topic-dot { width: 10px; height: 10px; border-radius: 50%; }
        .btn { padding: 12px 30px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: transparent; border: 2px solid var(--border); color: var(--text); padding: 10px 20px; font-size: 0.9rem; }
        .btn-danger { background: var(--danger); color: white; }
        /* Quiz layout */
        .quiz-layout { display: grid; grid-template-columns: 1fr 200px; gap: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .quiz-layout { grid-template-columns: 1fr; } .nav-panel { display: none; } }
        .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; min-height: 400px; }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 8px; }
        .q-header .progress { font-size: 0.85rem; color: var(--text-secondary); }
        .topic-tag { font-size: 0.75rem; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
        .diff-badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
        .diff-1 { background: rgba(22,163,74,0.1); color: var(--success); }
        .diff-2 { background: rgba(245,158,11,0.1); color: var(--warning); }
        .diff-3 { background: rgba(220,38,38,0.1); color: var(--danger); }
        .question-text { font-size: 1.1rem; margin-bottom: 25px; line-height: 1.8; }
        .choices { list-style: none; }
        .choice {
            display: flex; align-items: flex-start; padding: 12px 16px; margin-bottom: 8px;
            border: 2px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s;
        }
        .choice:hover { border-color: var(--primary); background: rgba(37,99,235,0.05); }
        .choice.selected { border-color: var(--primary); background: rgba(37,99,235,0.1); }
        .choice.correct { border-color: var(--success); background: rgba(22,163,74,0.1); }
        .choice.wrong { border-color: var(--danger); background: rgba(220,38,38,0.05); }
        .choice.locked { pointer-events: none; }
        .choice-letter {
            font-weight: bold; margin-right: 12px; min-width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: var(--unanswered); font-size: 0.85rem;
        }
        .choice.selected .choice-letter { background: var(--primary); color: white; }
        .choice.correct .choice-letter { background: var(--success); color: white; }
        .choice.wrong .choice-letter { background: var(--danger); color: white; }
        .choice-text { flex: 1; }
        /* Flag & nav */
        .question-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border); }
        .flag-btn {
            display: flex; align-items: center; gap: 6px; padding: 8px 14px;
            border: 2px solid var(--border); border-radius: 6px;
            background: transparent; color: var(--text); cursor: pointer; font-size: 0.9rem;
        }
        .flag-btn.flagged { border-color: var(--flagged); color: var(--flagged); }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-buttons .btn { padding: 10px 20px; font-size: 0.9rem; }
        .nav-panel { position: sticky; top: 20px; }
        .nav-panel h4 { margin-bottom: 10px; font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .nav-dot {
            width: 32px; height: 32px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: bold; cursor: pointer;
            border: 2px solid var(--border); background: var(--unanswered);
            color: var(--text); transition: all 0.15s;
        }
        .nav-dot:hover { transform: scale(1.1); }
        .nav-dot.answered { background: var(--answered); color: white; border-color: var(--answered); }
        .nav-dot.flagged { background: var(--flagged); color: white; border-color: var(--flagged); }
        .nav-dot.current { box-shadow: 0 0 0 3px var(--primary); }
        .nav-dot.correct-dot { background: var(--success); color: white; border-color: var(--success); }
        .nav-dot.wrong-dot { background: var(--danger); color: white; border-color: var(--danger); }
        .nav-legend { margin-top: 15px; font-size: 0.75rem; color: var(--text-secondary); }
        .nav-legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
        .submit-section { margin-top: 15px; }
        /* Results */
        .results-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .results-card h2 { margin-bottom: 15px; text-align: center; }
        .score-circle {
            width: 150px; height: 150px; border-radius: 50%;
            border: 8px solid var(--primary); display: flex; flex-direction: column;
            align-items: center; justify-content: center; margin: 20px auto;
        }
        .score-circle .score { font-size: 2.5rem; font-weight: bold; }
        .score-circle .total { font-size: 0.9rem; color: var(--text-secondary); }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .results-grid { grid-template-columns: 1fr; } }
        .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .result-card h4 { margin-bottom: 12px; color: var(--primary); }
        .topic-bar { display: flex; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        .topic-bar .label { width: 140px; }
        .topic-bar .bar-bg { flex: 1; height: 20px; background: var(--unanswered); border-radius: 10px; overflow: hidden; margin: 0 10px; }
        .topic-bar .bar-fill { height: 100%; border-radius: 10px; transition: width 0.5s; }
        .topic-bar .percent { width: 50px; text-align: right; font-weight: bold; }
        /* Review */
        .review-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
        .review-result { font-weight: 700; font-size: 0.9rem; }
        .review-result.correct { color: var(--success); }
        .review-result.wrong { color: var(--danger); }
        .step { margin-bottom: 6px; padding: 5px 10px; border-left: 3px solid var(--primary); font-size: 0.92rem; }
        .step strong { color: var(--primary); }
        .teach { margin-top: 8px; padding: 8px 12px; background: rgba(37,99,235,0.05); border-left: 3px solid var(--primary); border-radius: 0 6px 6px 0; font-size: 0.88rem; font-style: italic; }
        .teach strong { color: var(--primary); font-style: normal; }
        .gotcha { margin-top: 8px; padding: 8px 12px; background: rgba(139,92,246,0.08); border-left: 3px solid #8b5cf6; border-radius: 0 6px 6px 0; font-size: 0.85rem; }
        .gotcha strong { color: #7c3aed; }
        [data-theme="dark"] .teach { background: rgba(79,140,255,0.1); }
        [data-theme="dark"] .gotcha { background: rgba(139,92,246,0.15); }
        .theme-toggle { position: fixed; bottom: 20px; right: 20px; padding: 10px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); cursor: pointer; font-size: 1.2rem; z-index: 200; }
        .review-choices { font-size: 0.88rem; margin: 8px 0; }
        .review-choices .rc { padding: 3px 0; }
        .rc.rc-correct { color: var(--success); font-weight: 600; }
        .rc.rc-wrong { color: var(--danger); text-decoration: line-through; }
    </style>
</head>

        <div class="nav-links">

        <!-- ========== SETUP SCREEN ========== -->
        <div id="setup-screen">
            <h1>Question Bank</h1>
            <p class="subtitle">58 AP-level questions &mdash; Work &amp; Energy, Momentum, Rotation, Oscillations</p>
            <div class="setup-card">
                <h2>Select Topics</h2>
                <div class="topic-grid" id="topic-grid"></div>
                <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:15px;">Leave all unchecked to practice everything.</p>
                <button class="btn btn-primary" onclick="startQuiz()">Start Practice</button>

        <!-- ========== QUIZ SCREEN ========== -->
        <div id="quiz-screen" style="display:none;">
            <div class="quiz-layout">
                <div id="question-area"></div>

                    <h4>Questions</h4>
                    <div class="nav-grid" id="nav-grid"></div>
                    <div class="nav-legend">
                        <div><span class="legend-dot" style="background:var(--unanswered);border:1px solid var(--border);"></span> Unanswered</div>
                        <div><span class="legend-dot" style="background:var(--answered);"></span> Answered</div>
                        <div><span class="legend-dot" style="background:var(--flagged);"></span> Flagged</div>
                    </div>
                    <div class="submit-section">
                        <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="submitQuiz()">Submit All</button>
                    </div>
                </div>

        <!-- ========== RESULTS SCREEN ========== -->
        <div id="results-screen" style="display:none;"></div>

    <button class="theme-toggle" onclick="toggleTheme()">&#9790;</button>

<script>
// =============================================
// QUESTION DATA — 58 AP-level MC questions
// =============================================
const allQuestions = [
// ─────────── WORK & ENERGY (16) ───────────
{id:1, topic:"Work & Energy", subtopic:"Work definition", difficulty:1,
 text:"A 5 kg box is dragged 8 m across a floor by a rope making a $30°$ angle above the horizontal with a tension of $40$ N. The work done by the tension is:",
 choices:["$160$ J","$160\\sqrt{3}$ J","$320$ J","$80\\sqrt{3}$ J","$80$ J"],
 correctIndex:1,
 explanation:"$W = Fd\\cos\\theta = 40(8)\\cos 30° = 320(\\sqrt{3}/2) = 160\\sqrt{3} \\approx 277$ J.",
 teach:"Always identify the angle between the force and displacement vectors. Here it's 30°, not 60°.",
 gotcha:"Choice (A) forgets the cosine. Choice (C) uses cos 0°. Always include the angle."},

{id:2, topic:"Work & Energy", subtopic:"Work integral", difficulty:1,
 text:"A force $F(x) = 6x^2$ N acts on a particle. The work done as the particle moves from $x = 1$ m to $x = 3$ m is:",
 choices:["$18$ J","$48$ J","$52$ J","$54$ J","$162$ J"],
 correctIndex:2,
 explanation:"$W = \\int_1^3 6x^2\\,dx = [2x^3]_1^3 = 2(27) - 2(1) = 54 - 2 = 52$ J.",
 teach:"For variable forces, you must integrate. The formula $W = Fd$ only works for constant forces."},

{id:3, topic:"Work & Energy", subtopic:"Work-energy theorem", difficulty:1,
 text:"A 2 kg object initially at rest has a net work of $100$ J done on it. Its final speed is:",
 choices:["$5$ m/s","$7.1$ m/s","$10$ m/s","$50$ m/s","$14.1$ m/s"],
 correctIndex:2,
 explanation:"$W_{net} = \\Delta KE = \\frac{1}{2}mv^2 - 0$. So $v = \\sqrt{2W/m} = \\sqrt{2(100)/2} = \\sqrt{100} = 10$ m/s.",
 teach:"The work-energy theorem relates NET work to change in KE. Individual works by each force can also be summed."},

{id:4, topic:"Work & Energy", subtopic:"Gravitational PE", difficulty:1,
 text:"A 0.5 kg ball is dropped from height $20$ m (from rest). Using $g = 10$ m/s$^2$, its speed just before hitting the ground is:",
 choices:["$10$ m/s","$14.1$ m/s","$20$ m/s","$100$ m/s","$4.5$ m/s"],
 correctIndex:2,
 explanation:"$mgh = \\frac{1}{2}mv^2 \\Rightarrow v = \\sqrt{2gh} = \\sqrt{2(10)(20)} = \\sqrt{400} = 20$ m/s.",
 teach:"Energy conservation is the fastest method for finding speeds from height changes — no need for kinematics."},

{id:5, topic:"Work & Energy", subtopic:"Spring PE", difficulty:1,
 text:"A spring with $k = 800$ N/m is compressed $0.1$ m. A 0.2 kg ball is placed against it and released on a frictionless surface. The ball's speed when it leaves the spring is:",
 choices:["$1$ m/s","$2$ m/s","$4$ m/s","$10$ m/s","$20$ m/s"],
 correctIndex:1,
 explanation:"$\\frac{1}{2}kx^2 = \\frac{1}{2}mv^2 \\Rightarrow v = x\\sqrt{k/m} = 0.1\\sqrt{800/0.2} = 0.1\\sqrt{4000} = 2\\sqrt{10} \\approx 6.3$ m/s.",
 teach:"Set spring PE equal to KE. Don't forget to square the compression."},

{id:6, topic:"Work & Energy", subtopic:"Friction + energy", difficulty:2,
 text:"A 4 kg block slides from rest down a $30°$ incline that is $5$ m long ($\\mu_k = 0.2$, $g = 10$ m/s$^2$). Its speed at the bottom is closest to:",
 choices:["$3.7$ m/s","$5.0$ m/s","$5.7$ m/s","$7.1$ m/s","$8.7$ m/s"],
 correctIndex:2,
 explanation:"Height $h = 5\\sin 30° = 2.5$ m. $N = mg\\cos 30° = 4(10)(\\frac{\\sqrt{3}}{2}) = 20\\sqrt{3}$ N. Friction work $= \\mu_k N d = 0.2(20\\sqrt{3})(5) = 20\\sqrt{3} \\approx 34.6$ J. Energy: $mgh - f_k d = \\frac{1}{2}mv^2$. $4(10)(2.5) - 34.6 = \\frac{1}{2}(4)v^2$. $100 - 34.6 = 2v^2$. $v = \\sqrt{32.7} \\approx 5.7$ m/s.",
 teach:"On inclines, the normal force is $mg\\cos\\theta$, not $mg$. This is the #1 mistake on friction-on-incline problems."},

{id:7, topic:"Work & Energy", subtopic:"Friction + incline distance", difficulty:2,
 text:"A 2 kg block is launched UP a $37°$ rough incline ($\\mu_k = 0.25$) with initial speed $10$ m/s. Use $g = 10$ m/s$^2$, $\\sin 37° = 0.6$, $\\cos 37° = 0.8$. The distance it travels up the incline before stopping is:",
 choices:["$3.6$ m","$5.0$ m","$6.25$ m","$7.1$ m","$8.3$ m"],
 correctIndex:2,
 explanation:"$mg\\sin\\theta = 2(10)(0.6) = 12$ N (gravity component along incline). $f_k = \\mu_k mg\\cos\\theta = 0.25(20)(0.8) = 4$ N. Both oppose motion going up. Net deceleration force $= 12 + 4 = 16$ N. By work-energy: $\\frac{1}{2}(2)(100) = 16d \\Rightarrow d = 100/16 = 6.25$ m.",
 gotcha:"Friction and gravity component both oppose the motion going uphill. When the block slides back down, friction reverses direction but gravity doesn't."},

{id:8, topic:"Work & Energy", subtopic:"Power basics", difficulty:2,
 text:"A car of mass $1200$ kg drives up a $5°$ hill at constant velocity $20$ m/s. If rolling friction is $200$ N, the power output of the engine is closest to ($g = 10$ m/s$^2$):",
 choices:["$4$ kW","$8.9$ kW","$24.9$ kW","$20.9$ kW","$25.1$ kW"],
 correctIndex:3,
 explanation:"At constant velocity, $F_{engine} = mg\\sin 5° + f_{rolling} = 1200(10)(0.0872) + 200 \\approx 1046 + 200 = 1246$ N. $P = Fv = 1246(20) \\approx 24{,}920$ W $\\approx 24.9$ kW.",
 teach:"At constant velocity, the engine force exactly balances all resistive forces. Power = Force × velocity."},

{id:9, topic:"Work & Energy", subtopic:"Power calculus", difficulty:2,
 text:"A particle of mass $2$ kg has position $x(t) = 3t^2 + t^3$ m. The instantaneous power delivered by the net force at $t = 1$ s is:",
 choices:["$78$ W","$114$ W","$126$ W","$156$ W","$198$ W"],
 correctIndex:3,
 explanation:"$v = dx/dt = 6t + 3t^2$. At $t=1$: $v = 9$ m/s. $a = dv/dt = 6 + 6t$. At $t=1$: $a = 12$ m/s$^2$. $P = Fv = mav = 2(12)(9) = 216$ W.",
 teach:"Instantaneous power: $P = \\vec{F}\\cdot\\vec{v} = mav$. Differentiate position twice for acceleration."},

{id:10, topic:"Work & Energy", subtopic:"PE curve equilibrium", difficulty:2,
 text:"A particle has potential energy $U(x) = 2x^3 - 9x^2 + 12x$ J. The equilibrium positions are at:",
 choices:["$x = 1$ and $x = 2$","$x = 0$ and $x = 3$","$x = 1$ only","$x = 2$ only","$x = 0$ and $x = 2$"],
 correctIndex:0,
 explanation:"$F = -dU/dx = -(6x^2 - 18x + 12) = -6(x^2 - 3x + 2) = -6(x-1)(x-2)$. Setting $F = 0$: $x = 1$ and $x = 2$.",
 teach:"Equilibrium occurs where $F = 0$, i.e., $dU/dx = 0$. Then check the sign of $d^2U/dx^2$ for stability."},

{id:11, topic:"Work & Energy", subtopic:"PE stability", difficulty:2,
 text:"For $U(x) = 2x^3 - 9x^2 + 12x$ J (from the previous problem), the equilibrium at $x = 1$ is:",
 choices:["Stable","Unstable","Neutral","Cannot determine","Both stable and unstable"],
 correctIndex:0,
 explanation:"$d^2U/dx^2 = 12x - 18$. At $x = 1$: $12(1) - 18 = -6 < 0$, so $U$ has a local maximum. A local max of $U$ means UNSTABLE equilibrium — the particle accelerates away if displaced. At $x = 2$: $12(2) - 18 = 6 > 0$, local min, STABLE.",
 teach:"Local minimum of $U$ = stable equilibrium (particle returns when displaced). Local max = unstable (particle accelerates away). Check sign of $d^2U/dx^2$."},

{id:12, topic:"Work & Energy", subtopic:"Loop-the-loop", difficulty:2,
 text:"A ball starts from rest and slides down a frictionless track into a circular loop of radius $R$. The minimum height $h$ from which it must be released (measured from the bottom of the loop) to complete the loop is:",
 choices:["$R$","$2R$","$5R/2$","$3R$","$4R$"],
 correctIndex:2,
 explanation:"At the top of the loop, $mg = mv^2/R \\Rightarrow v^2 = gR$. Energy: $mgh = mg(2R) + \\frac{1}{2}mv^2 = mg(2R) + \\frac{1}{2}mgR = mg(5R/2)$. So $h = 5R/2$.",
 teach:"The minimum speed at the top occurs when normal force = 0, leaving gravity alone for centripetal force.",
 gotcha:"Common trap: using $v = 0$ at the top. The ball must have speed at the top to maintain contact!"},

{id:13, topic:"Work & Energy", subtopic:"Vertical spring", difficulty:3,
 text:"A 2 kg block is dropped from rest onto a vertical spring ($k = 500$ N/m) from a height of $1$ m above the spring's natural length. The maximum compression of the spring is closest to ($g = 10$ m/s$^2$):",
 choices:["$0.1$ m","$0.2$ m","$0.32$ m","$0.4$ m","$0.5$ m"],
 correctIndex:2,
 explanation:"Let $d$ = compression. The block falls a total distance $(1 + d)$. Energy conservation: $mg(1 + d) = \\frac{1}{2}kd^2$. $2(10)(1+d) = \\frac{1}{2}(500)d^2$. $20 + 20d = 250d^2$. $250d^2 - 20d - 20 = 0$. $25d^2 - 2d - 2 = 0$. $d = \\frac{2 + \\sqrt{4 + 200}}{50} = \\frac{2 + \\sqrt{204}}{50} = \\frac{2 + 14.28}{50} \\approx 0.326$ m.",
 teach:"Don't forget that the block falls an EXTRA distance $d$ during compression. The gravitational PE includes $(h + d)$.",
 gotcha:"A common error is using $mgh = \\frac{1}{2}kd^2$ without the extra $mgd$ for the compression distance."},

{id:14, topic:"Work & Energy", subtopic:"Variable force integration", difficulty:3,
 text:"A force $F(x) = 10\\sin(\\pi x/4)$ N acts on a particle from $x = 0$ to $x = 4$ m. The total work done is:",
 choices:["$0$ J","$20/\\pi$ J","$40/\\pi$ J","$80/\\pi$ J","$20$ J"],
 correctIndex:3,
 explanation:"$W = \\int_0^4 10\\sin(\\pi x/4)\\,dx$. Let $u = \\pi x/4$, $du = \\pi/4\\,dx$. $W = 10 \\cdot \\frac{4}{\\pi}\\int_0^{\\pi} \\sin u\\,du = \\frac{40}{\\pi}[-\\cos u]_0^{\\pi} = \\frac{40}{\\pi}[-(-1) - (-1)] = \\frac{40}{\\pi}(2) = \\frac{80}{\\pi}$ J.",
 teach:"For sinusoidal forces, careful substitution is needed. Always check limits after substitution."},

{id:15, topic:"Work & Energy", subtopic:"PE graph turning points", difficulty:3,
 text:"A particle with total energy $E = 8$ J moves in a potential $U(x)$ that has values: $U(0)=10$, $U(2)=4$, $U(4)=8$, $U(6)=2$, $U(8)=12$ J. The particle, moving rightward and currently at $x = 2$, will next reverse direction at approximately:",
 choices:["$x = 0$","$x = 4$","$x = 6$","$x = 8$","It never reverses"],
 correctIndex:1,
 explanation:"A turning point occurs where $U(x) = E = 8$ J and the particle cannot go further because $KE$ would become negative. Moving rightward from $x=2$ ($U = 4$, so $KE = 4$ J), the particle reaches $x=4$ where $U = 8 = E$, so $KE = 0$. It turns around here.",
 teach:"On a PE diagram, the particle is confined to regions where $U(x) \\le E$. Turning points are where $U = E$."},

{id:16, topic:"Work & Energy", subtopic:"Multi-step energy", difficulty:3,
 text:"A 1 kg block is released from a compressed spring ($k = 200$ N/m, $x = 0.5$ m) on a horizontal surface with $\\mu_k = 0.4$. After leaving the spring, it travels $2$ m on the rough surface, then up a frictionless ramp. The maximum height reached is ($g = 10$ m/s$^2$):",
 choices:["$0.5$ m","$1.0$ m","$1.7$ m","$2.5$ m","$1.25$ m"],
 correctIndex:2,
 explanation:"Spring PE = $\\frac{1}{2}(200)(0.25) = 25$ J. Friction loss on flat = $\\mu_k mg d = 0.4(1)(10)(2) = 8$ J. Remaining KE = $25 - 8 = 17$ J. On frictionless ramp: $17 = mgh \\Rightarrow h = 17/10 = 1.7$ m.",
 teach:"Track the energy budget step by step: start with spring PE, subtract friction losses, convert remainder to gravitational PE."},

// ─────────── MOMENTUM (14) ───────────
{id:17, topic:"Momentum", subtopic:"Impulse basic", difficulty:1,
 text:"A 0.5 kg ball moving at $8$ m/s to the right bounces off a wall and returns at $6$ m/s to the left. The magnitude of the impulse on the ball is:",
 choices:["$1$ N$\\cdot$s","$2$ N$\\cdot$s","$4$ N$\\cdot$s","$7$ N$\\cdot$s","$5$ N$\\cdot$s"],
 correctIndex:3,
 explanation:"$J = \\Delta p = m(v_f - v_i) = 0.5(-6 - 8) = 0.5(-14) = -7$ N$\\cdot$s. Magnitude = $7$ N$\\cdot$s.",
 teach:"Impulse equals change in momentum. Be careful with signs — if the ball reverses, the velocities have opposite signs.",
 gotcha:"Don't subtract the magnitudes ($8-6=2$). You must account for the direction change: the total change is $8+6=14$ times mass."},

{id:18, topic:"Momentum", subtopic:"Impulse integral", difficulty:1,
 text:"A force $F(t) = 12t - 3t^2$ N acts on a 2 kg object initially at rest from $t = 0$ to $t = 4$ s. The final velocity is:",
 choices:["$0$ m/s","$8$ m/s","$16$ m/s","$32$ m/s","$4$ m/s"],
 correctIndex:1,
 explanation:"$J = \\int_0^4 (12t - 3t^2)\\,dt = [6t^2 - t^3]_0^4 = 6(16) - 64 = 96 - 64 = 32$ N$\\cdot$s. But wait: $J = m\\Delta v \\Rightarrow 32 = 2v_f \\Rightarrow v_f = 16$ m/s.",
 teach:"When the force varies with time, integrate to find the impulse, then use $J = m\\Delta v$."},

{id:19, topic:"Momentum", subtopic:"Perfectly inelastic", difficulty:1,
 text:"A 3 kg cart moving at $6$ m/s collides with a stationary 2 kg cart. They stick together. The velocity after collision is:",
 choices:["$2$ m/s","$3$ m/s","$3.6$ m/s","$4.5$ m/s","$5$ m/s"],
 correctIndex:2,
 explanation:"$m_1 v_1 = (m_1 + m_2)v_f$. $3(6) = 5v_f \\Rightarrow v_f = 18/5 = 3.6$ m/s.",
 teach:"Perfectly inelastic = stick together. Momentum is conserved; KE is NOT conserved (maximum KE loss)."},

{id:20, topic:"Momentum", subtopic:"Elastic equal mass", difficulty:2,
 text:"Ball A ($2$ kg, $5$ m/s) collides head-on and elastically with Ball B ($2$ kg, at rest). After collision:",
 choices:["A stops, B moves at $5$ m/s","A moves at $2.5$ m/s, B at $2.5$ m/s","A bounces at $5$ m/s, B stays","A moves at $1$ m/s, B at $4$ m/s","Both move at $5$ m/s"],
 correctIndex:0,
 explanation:"In a 1D elastic collision between equal masses with one at rest, the moving ball stops and transfers all its velocity to the other. This follows from both conservation of momentum and conservation of KE.",
 teach:"Equal-mass elastic collision with target at rest: velocities swap. This is a fundamental result worth memorizing."},

{id:21, topic:"Momentum", subtopic:"Elastic unequal mass", difficulty:2,
 text:"A 1 kg ball moving at $10$ m/s collides elastically with a 3 kg ball at rest. The velocity of the 1 kg ball after collision is:",
 choices:["$-5$ m/s","$5$ m/s","$-2.5$ m/s","$0$ m/s","$-10$ m/s"],
 correctIndex:0,
 explanation:"$v_1' = \\frac{m_1 - m_2}{m_1 + m_2}v_1 = \\frac{1-3}{1+3}(10) = \\frac{-2}{4}(10) = -5$ m/s. The lighter ball bounces back.",
 teach:"Elastic collision formulas: $v_1' = \\frac{m_1-m_2}{m_1+m_2}v_1$ and $v_2' = \\frac{2m_1}{m_1+m_2}v_1$ (when target is at rest).",
 gotcha:"The negative sign means the ball reverses direction. Lighter objects always bounce back off heavier stationary targets."},

{id:22, topic:"Momentum", subtopic:"Collision classification", difficulty:2,
 text:"Two objects collide. Before: $m_1 = 2$ kg at $6$ m/s, $m_2 = 4$ kg at rest. After: $m_1$ at $-2$ m/s, $m_2$ at $4$ m/s. This collision is:",
 choices:["Elastic","Inelastic","Perfectly inelastic","Superelastic","Not possible (violates conservation)"],
 correctIndex:0,
 explanation:"Check momentum: $2(6) + 0 = 12$. After: $2(-2) + 4(4) = -4 + 16 = 12$. Check KE before: $\\frac{1}{2}(2)(36) = 36$ J. After: $\\frac{1}{2}(2)(4) + \\frac{1}{2}(4)(16) = 4 + 32 = 36$ J. Both p and KE conserved $\\Rightarrow$ elastic.",
 teach:"To classify a collision: first check momentum (must be conserved). Then compare KE before and after."},

{id:23, topic:"Momentum", subtopic:"2D collision", difficulty:2,
 text:"A 2 kg ball moving at $5$ m/s in the $+x$ direction collides with a 1 kg ball at rest. After collision, the 2 kg ball moves at $3$ m/s at $30°$ above the $x$-axis. The $y$-component of the 1 kg ball's velocity is:",
 choices:["$-3$ m/s","$3$ m/s","$-1$ m/s","$1$ m/s","$-6$ m/s"],
 correctIndex:0,
 explanation:"$y$-momentum: $0 = 2(3)\\sin 30° + 1(v_{2y})$. $0 = 2(3)(0.5) + v_{2y} = 3 + v_{2y}$. $v_{2y} = -3$ m/s.",
 teach:"In 2D collisions, apply conservation of momentum separately in $x$ and $y$ directions."},

{id:24, topic:"Momentum", subtopic:"Explosion", difficulty:2,
 text:"A 5 kg object at rest explodes into two pieces: a 2 kg piece flies east at $15$ m/s. The speed of the 3 kg piece is:",
 choices:["$5$ m/s","$10$ m/s","$15$ m/s","$25$ m/s","$7.5$ m/s"],
 correctIndex:1,
 explanation:"Initial momentum = 0. So $0 = 2(15) + 3v_2 \\Rightarrow v_2 = -30/3 = -10$ m/s. Speed = $10$ m/s (westward).",
 teach:"Explosions are the reverse of perfectly inelastic collisions. Total momentum before = 0, so the pieces have equal and opposite momenta."},

{id:25, topic:"Momentum", subtopic:"Center of mass position", difficulty:2,
 text:"Three particles are on the $x$-axis: $2$ kg at $x = 0$, $3$ kg at $x = 4$ m, $5$ kg at $x = 10$ m. The center of mass is at:",
 choices:["$x = 4.7$ m","$x = 5.0$ m","$x = 6.2$ m","$x = 7.0$ m","$x = 4.0$ m"],
 correctIndex:2,
 explanation:"$x_{cm} = \\frac{2(0) + 3(4) + 5(10)}{2 + 3 + 5} = \\frac{0 + 12 + 50}{10} = \\frac{62}{10} = 6.2$ m.",
 teach:"$x_{cm} = \\sum m_i x_i / \\sum m_i$. The center of mass is always between the outermost particles."},

{id:26, topic:"Momentum", subtopic:"CM velocity", difficulty:2,
 text:"A 4 kg object moves right at $3$ m/s and a 6 kg object moves left at $2$ m/s. The velocity of the center of mass is:",
 choices:["$0$ m/s","$0.5$ m/s right","$1.0$ m/s right","$0.5$ m/s left","$2.4$ m/s left"],
 correctIndex:0,
 explanation:"$v_{cm} = \\frac{m_1 v_1 + m_2 v_2}{m_1 + m_2} = \\frac{4(3) + 6(-2)}{10} = \\frac{12 - 12}{10} = 0$ m/s.",
 teach:"$v_{cm} = p_{total}/M_{total}$. If the total momentum is zero, the center of mass is stationary regardless of individual motions."},

{id:27, topic:"Momentum", subtopic:"Ballistic pendulum", difficulty:3,
 text:"A $10$ g bullet embeds in a $2$ kg block suspended by strings. The block+bullet swings up to a height of $0.05$ m. The bullet's initial speed was ($g = 10$ m/s$^2$):",
 choices:["$100$ m/s","$201$ m/s","$300$ m/s","$500$ m/s","$150$ m/s"],
 correctIndex:1,
 explanation:"After embedding: $v = \\sqrt{2gh} = \\sqrt{2(10)(0.05)} = 1$ m/s. Momentum: $0.01(v_0) = (2.01)(1)$. $v_0 = 2.01/0.01 = 201$ m/s.",
 teach:"Ballistic pendulum is a TWO-step problem: (1) inelastic collision conserves momentum, (2) pendulum rise conserves energy. Never mix the two steps!",
 gotcha:"Don't try to use energy conservation through the collision — KE is lost! Use momentum for the collision, energy for the swing."},

{id:28, topic:"Momentum", subtopic:"2D elastic angles", difficulty:3,
 text:"A ball collides elastically with an identical stationary ball. After the collision, the two balls move at right angles to each other. If the first ball is deflected $30°$ from its original path, it retains what fraction of its original KE?",
 choices:["$1/4$","$1/2$","$3/4$","$\\sqrt{3}/2$","$1/3$"],
 correctIndex:2,
 explanation:"For equal-mass elastic collisions, the two balls always separate at $90°$. If ball 1 goes at angle $\\alpha$, ball 2 goes at angle $(90°-\\alpha)$. From momentum: $v_1' = v_0 \\cos\\alpha$. $KE_1'/KE_0 = (v_1'/v_0)^2 = \\cos^2 30° = 3/4$.",
 teach:"In equal-mass 2D elastic collisions, the scattered velocities satisfy $v_1' = v_0\\cos\\alpha$ and $v_2' = v_0\\sin\\alpha$."},

{id:29, topic:"Momentum", subtopic:"Rocket thrust", difficulty:3,
 text:"A rocket in deep space has mass $1000$ kg and exhausts gas at $v_e = 3000$ m/s at a rate of $5$ kg/s. The initial thrust (force) on the rocket is:",
 choices:["$3000$ N","$5000$ N","$15{,}000$ N","$600$ N","$1500$ N"],
 correctIndex:2,
 explanation:"Thrust $= v_e \\cdot dm/dt = 3000 \\times 5 = 15{,}000$ N.",
 teach:"Rocket thrust = exhaust velocity × mass flow rate. This follows directly from $F = dp/dt$."},

{id:30, topic:"Momentum", subtopic:"Collision then projectile", difficulty:3,
 text:"A 2 kg ball moving at $10$ m/s collides with and sticks to a 3 kg ball at rest on the edge of a table 1.25 m high. The combined mass lands a horizontal distance from the table edge of ($g = 10$ m/s$^2$):",
 choices:["$1$ m","$2$ m","$3$ m","$4$ m","$5$ m"],
 correctIndex:1,
 explanation:"Collision: $v = 2(10)/5 = 4$ m/s. Projectile: time to fall $1.25$ m: $t = \\sqrt{2h/g} = \\sqrt{2(1.25)/10} = \\sqrt{0.25} = 0.5$ s. Horizontal distance $= 4(0.5) = 2$ m.",
 teach:"Multi-step: first use momentum for the collision, then kinematics for the projectile. Keep steps separate."},

// ─────────── ROTATION (18) ───────────
{id:31, topic:"Rotation", subtopic:"Moment of inertia", difficulty:1,
 text:"Rank the following objects (same mass $M$, same radius $R$) by moment of inertia about their central axis, from smallest to largest: (i) solid sphere, (ii) solid disk, (iii) thin-walled hollow sphere, (iv) hoop.",
 choices:["i, ii, iii, iv","ii, i, iii, iv","i, ii, iv, iii","ii, i, iv, iii","iii, i, ii, iv"],
 correctIndex:0,
 explanation:"$I_{solid\\ sphere} = \\frac{2}{5}MR^2$, $I_{disk} = \\frac{1}{2}MR^2$, $I_{hollow\\ sphere} = \\frac{2}{3}MR^2$, $I_{hoop} = MR^2$. Order: $2/5 < 1/2 < 2/3 < 1$.",
 teach:"Memorize: solid sphere (2/5), disk/cylinder (1/2), hollow sphere (2/3), hoop/ring (1). Objects with mass farther from axis have larger $I$."},

{id:32, topic:"Rotation", subtopic:"Rotational KE", difficulty:1,
 text:"A solid disk ($M = 4$ kg, $R = 0.5$ m) rotates at $\\omega = 10$ rad/s. Its rotational kinetic energy is:",
 choices:["$5$ J","$10$ J","$12.5$ J","$25$ J","$50$ J"],
 correctIndex:2,
 explanation:"$I = \\frac{1}{2}MR^2 = \\frac{1}{2}(4)(0.25) = 0.5$ kg$\\cdot$m$^2$. $KE = \\frac{1}{2}I\\omega^2 = \\frac{1}{2}(0.5)(100) = 25$ J.",
 teach:"$KE_{rot} = \\frac{1}{2}I\\omega^2$. Remember to compute $I$ first using the correct formula for the shape."},

{id:33, topic:"Rotation", subtopic:"Torque", difficulty:1,
 text:"A force of $20$ N is applied at the end of a $0.4$ m wrench at $60°$ to the wrench. The torque about the bolt is:",
 choices:["$2.0$ N$\\cdot$m","$4.0$ N$\\cdot$m","$6.9$ N$\\cdot$m","$8.0$ N$\\cdot$m","$3.5$ N$\\cdot$m"],
 correctIndex:2,
 explanation:"$\\tau = rF\\sin\\theta = 0.4(20)\\sin 60° = 8(\\sqrt{3}/2) = 4\\sqrt{3} \\approx 6.93$ N$\\cdot$m.",
 teach:"Torque uses the sine of the angle between the force and the lever arm (or equivalently, the perpendicular component of the force times the distance)."},

{id:34, topic:"Rotation", subtopic:"Newton's 2nd for rotation", difficulty:1,
 text:"A string wrapped around a solid cylinder ($M = 6$ kg, $R = 0.2$ m) exerts a tangential force of $9$ N. The angular acceleration of the cylinder about its axis is:",
 choices:["$7.5$ rad/s$^2$","$10$ rad/s$^2$","$15$ rad/s$^2$","$30$ rad/s$^2$","$75$ rad/s$^2$"],
 correctIndex:2,
 explanation:"$I = \\frac{1}{2}MR^2 = \\frac{1}{2}(6)(0.04) = 0.12$ kg$\\cdot$m$^2$. $\\tau = FR = 9(0.2) = 1.8$ N$\\cdot$m. $\\alpha = \\tau/I = 1.8/0.12 = 15$ rad/s$^2$.",
 teach:"Newton's 2nd for rotation: $\\tau_{net} = I\\alpha$. Don't forget to compute torque ($\\tau = FR$) — it's not just the force."},

{id:35, topic:"Rotation", subtopic:"Parallel axis theorem", difficulty:1,
 text:"A uniform rod of mass $M$ and length $L$ has $I_{cm} = \\frac{1}{12}ML^2$. Its moment of inertia about one end is:",
 choices:["$\\frac{1}{6}ML^2$","$\\frac{1}{4}ML^2$","$\\frac{1}{3}ML^2$","$\\frac{1}{2}ML^2$","$\\frac{7}{12}ML^2$"],
 correctIndex:2,
 explanation:"Parallel axis theorem: $I = I_{cm} + Md^2 = \\frac{1}{12}ML^2 + M(L/2)^2 = \\frac{1}{12}ML^2 + \\frac{1}{4}ML^2 = \\frac{1}{3}ML^2$.",
 teach:"$I = I_{cm} + Md^2$ where $d$ is the distance from the center of mass to the new axis. This always INCREASES $I$."},

{id:36, topic:"Rotation", subtopic:"Angular momentum", difficulty:1,
 text:"A disk ($I = 0.5$ kg$\\cdot$m$^2$) spins at $4$ rad/s. A second identical disk (not spinning) is dropped on top. Assuming they reach a common angular velocity, that velocity is:",
 choices:["$1$ rad/s","$2$ rad/s","$3$ rad/s","$4$ rad/s","$0.5$ rad/s"],
 correctIndex:1,
 explanation:"$L$ is conserved: $I_1 \\omega_1 = (I_1 + I_2)\\omega_f$. $0.5(4) = (0.5 + 0.5)\\omega_f$. $\\omega_f = 2/1 = 2$ rad/s.",
 teach:"When there's no external torque, angular momentum is conserved. The combined $I$ doubles, so $\\omega$ halves."},

{id:37, topic:"Rotation", subtopic:"Rolling constraint", difficulty:2,
 text:"A wheel of radius $0.3$ m rolls without slipping. If its center moves at $6$ m/s, its angular velocity is:",
 choices:["$2$ rad/s","$10$ rad/s","$18$ rad/s","$20$ rad/s","$1.8$ rad/s"],
 correctIndex:3,
 explanation:"Rolling without slipping: $v = \\omega R \\Rightarrow \\omega = v/R = 6/0.3 = 20$ rad/s.",
 teach:"Rolling without slipping means $v_{cm} = \\omega R$. This constraint connects translational and rotational motion."},

{id:38, topic:"Rotation", subtopic:"Rolling race", difficulty:2,
 text:"A solid sphere, a solid cylinder, and a hoop (all same mass and radius) are released from the same height on an incline. They roll without slipping. The order in which they reach the bottom (first to last) is:",
 choices:["Sphere, cylinder, hoop","Cylinder, sphere, hoop","Hoop, cylinder, sphere","They arrive simultaneously","Sphere, hoop, cylinder"],
 correctIndex:0,
 explanation:"$a = \\frac{g\\sin\\theta}{1 + I/(MR^2)}$. Ratios: sphere $I/MR^2 = 2/5$, cylinder $= 1/2$, hoop $= 1$. Smaller ratio means larger acceleration. Order: sphere (fastest), cylinder, hoop (slowest).",
 teach:"In a rolling race, the object with the smallest $I/(MR^2)$ ratio wins. Mass and radius cancel out — only the shape matters!",
 gotcha:"The answer is the same regardless of mass, radius, or incline angle. Only the geometry (shape) matters."},

{id:39, topic:"Rotation", subtopic:"Rolling total KE", difficulty:2,
 text:"A solid sphere ($M = 3$ kg) rolls without slipping at $v_{cm} = 5$ m/s. Its total kinetic energy is:",
 choices:["$37.5$ J","$52.5$ J","$75$ J","$105$ J","$25$ J"],
 correctIndex:1,
 explanation:"$KE = \\frac{1}{2}Mv^2 + \\frac{1}{2}I\\omega^2 = \\frac{1}{2}Mv^2 + \\frac{1}{2}(\\frac{2}{5}MR^2)(v/R)^2 = \\frac{1}{2}Mv^2 + \\frac{1}{5}Mv^2 = \\frac{7}{10}Mv^2$. $= \\frac{7}{10}(3)(25) = 52.5$ J.",
 teach:"For rolling without slipping: total $KE = \\frac{1}{2}Mv^2(1 + I/MR^2)$. For a solid sphere: $KE = \\frac{7}{10}Mv^2$."},

{id:40, topic:"Rotation", subtopic:"Rolling up incline", difficulty:2,
 text:"A solid sphere rolling at $v_0 = 7$ m/s on a flat surface reaches a frictionless incline. The maximum height it reaches is ($g = 10$ m/s$^2$):",
 choices:["$2.45$ m","$3.43$ m","$4.9$ m","$7$ m","$1.72$ m"],
 correctIndex:1,
 explanation:"On a frictionless incline, there is no torque, so $\\omega$ stays constant and the sphere slides. Only translational KE converts to PE: $\\frac{1}{2}Mv_0^2 = Mgh \\Rightarrow h = v_0^2/(2g) = 49/20 = 2.45$ m. The rotational KE is trapped — it cannot convert to height without friction.",
 teach:"On a frictionless incline, a rolling ball SLIDES — no friction means no torque to change $\\omega$. Only translational KE converts to PE.",
 gotcha:"If the incline has friction (rolling without slipping continues), then ALL KE converts: $h = \\frac{7v^2}{10g}$. On a frictionless incline, only $\\frac{v^2}{2g}$."},

{id:41, topic:"Rotation", subtopic:"Disk-on-disk collision", difficulty:2,
 text:"A disk ($I = 2$ kg$\\cdot$m$^2$, $\\omega = 6$ rad/s) collides with a stationary disk ($I = 4$ kg$\\cdot$m$^2$). They lock together. What fraction of the initial KE is lost?",
 choices:["$1/3$","$1/2$","$2/3$","$3/4$","$1/4$"],
 correctIndex:2,
 explanation:"$L$ conserved: $2(6) = 6\\omega_f \\Rightarrow \\omega_f = 2$ rad/s. $KE_i = \\frac{1}{2}(2)(36) = 36$ J. $KE_f = \\frac{1}{2}(6)(4) = 12$ J. Fraction lost $= (36-12)/36 = 24/36 = 2/3$.",
 teach:"Rotational inelastic collisions work the same as linear ones. Conserve $L$, then compare KE before and after."},

{id:42, topic:"Rotation", subtopic:"Skater arms", difficulty:2,
 text:"A figure skater spins with arms extended ($I = 5$ kg$\\cdot$m$^2$) at $2$ rev/s. She pulls her arms in ($I = 2$ kg$\\cdot$m$^2$). Her new angular velocity and the ratio $KE_f/KE_i$ are:",
 choices:["$5$ rev/s, $2.5$","$5$ rev/s, $5$","$2$ rev/s, $1$","$4$ rev/s, $2$","$10$ rev/s, $5$"],
 correctIndex:0,
 explanation:"$L = I_1\\omega_1 = 5(2) = 10$. $\\omega_f = 10/2 = 5$ rev/s. $KE_i = \\frac{1}{2}(5)(2)^2 = 10$ (arbitrary units). $KE_f = \\frac{1}{2}(2)(5)^2 = 25$. Ratio $= 25/10 = 2.5$.",
 teach:"When a skater pulls arms in, $L$ is conserved but $KE$ increases. The extra energy comes from the skater's muscles doing work.",
 gotcha:"KE is NOT conserved here — the skater does internal work. $L$ is conserved because there's no external torque."},

{id:43, topic:"Rotation", subtopic:"Static equilibrium", difficulty:2,
 text:"A uniform beam of mass $10$ kg and length $4$ m is supported at its left end (pivot) and by a vertical cable at $3$ m from the left end. A $20$ kg mass hangs from the right end. The tension in the cable is ($g = 10$ m/s$^2$):",
 choices:["$100$ N","$150$ N","$200$ N","$300$ N","$250$ N"],
 correctIndex:2,
 explanation:"Torques about pivot: beam weight $60$ N acts at $2$ m, hanging mass $120$ N acts at $4$ m, cable tension $T$ acts at $3$ m. $60(2) + 120(4) = T(3)$. $120 + 480 = 3T$. $T = 600/3 = 200$ N.",
 teach:"For static equilibrium, $\\sum \\tau = 0$ about any point. Choose the pivot point to eliminate unknowns. The beam's weight acts at its center."},

{id:44, topic:"Rotation", subtopic:"Rod pivoted at end", difficulty:2,
 text:"A uniform rod of mass $M$ and length $L$ is pivoted at one end and released from horizontal. The initial angular acceleration is:",
 choices:["$g/L$","$2g/L$","$3g/(2L)$","$g/(2L)$","$3g/L$"],
 correctIndex:2,
 explanation:"$I_{end} = \\frac{1}{3}ML^2$. Torque from gravity about pivot: $\\tau = Mg(L/2)$. $\\alpha = \\tau/I = \\frac{MgL/2}{ML^2/3} = \\frac{3g}{2L}$.",
 teach:"For a pivoted rod: $I_{end} = \\frac{1}{3}ML^2$ and the gravitational torque acts at the center of mass (distance $L/2$ from the pivot)."},

{id:45, topic:"Rotation", subtopic:"Atwood with pulley", difficulty:3,
 text:"Two masses ($m_1 = 4$ kg, $m_2 = 2$ kg) hang from a string over a solid disk pulley ($M = 2$ kg, $R = 0.1$ m). The acceleration of the system is ($g = 10$ m/s$^2$):",
 choices:["$10/3$ m/s$^2$","$20/7$ m/s$^2$","$10/7$ m/s$^2$","$4$ m/s$^2$","$5/3$ m/s$^2"],
 correctIndex:1,
 explanation:"For $m_1$: $m_1 g - T_1 = m_1 a$. For $m_2$: $T_2 - m_2 g = m_2 a$. For the pulley: $(T_1 - T_2)R = I\\alpha = \\frac{1}{2}MR^2(a/R)$, so $T_1 - T_2 = Ma/2$. Adding all three equations: $(m_1 - m_2)g = (m_1 + m_2 + M/2)a$. $a = \\frac{(4-2)(10)}{4+2+1} = \\frac{20}{7} \\approx 2.86$ m/s$^2$.",
 teach:"When the pulley has mass, $T_1 \\neq T_2$. The pulley's inertia adds $M/2$ (for a disk) to the effective mass in the denominator.",
 gotcha:"With a massless pulley, $a = (m_1-m_2)g/(m_1+m_2) = 10/3$ m/s$^2$. The massive pulley makes it smaller."},

{id:46, topic:"Rotation", subtopic:"Friction for rolling", difficulty:3,
 text:"A solid sphere of mass $M$ is placed on an incline of angle $\\theta$ and rolls without slipping. The friction force on the sphere is:",
 choices:["$Mg\\sin\\theta$","$\\frac{2}{7}Mg\\sin\\theta$","$\\frac{5}{7}Mg\\sin\\theta$","$\\frac{2}{5}Mg\\sin\\theta$","$\\mu_s Mg\\cos\\theta$"],
 correctIndex:1,
 explanation:"For rolling without slipping: $a = \\frac{g\\sin\\theta}{1 + I/(MR^2)} = \\frac{g\\sin\\theta}{1 + 2/5} = \\frac{5g\\sin\\theta}{7}$. Torque: $fR = I\\alpha = \\frac{2}{5}MR^2 \\cdot a/R$. $f = \\frac{2}{5}Ma = \\frac{2}{5}M \\cdot \\frac{5g\\sin\\theta}{7} = \\frac{2}{7}Mg\\sin\\theta$.",
 teach:"The friction force for rolling is found from $\\tau = I\\alpha$, not from $f = \\mu N$. Static friction adjusts to whatever is needed for rolling."},

{id:47, topic:"Rotation", subtopic:"Angular momentum point mass", difficulty:3,
 text:"A 2 kg particle moves in a straight line with velocity $\\vec{v} = 5\\hat{j}$ m/s. At the instant when the particle is at position $\\vec{r} = 3\\hat{i}$ m relative to the origin, its angular momentum about the origin is:",

// =============================================
// STATE
// =============================================
const topicMeta = {
    "Work & Energy": { color: "#16a34a", count: 16 },
    "Momentum":      { color: "#d97706", count: 14 },
    "Rotation":      { color: "#dc2626", count: 18 },
    "Oscillations":  { color: "#0891b2", count: 10 }
};
const topicNames = Object.keys(topicMeta);
let selectedTopics = [];
let quizQs = [];
let currentQ = 0;
let userAnswers = [];
let userFlags = [];
let submitted = false;

// =============================================
// SETUP
// =============================================
function initSetup() {
    const grid = document.getElementById('topic-grid');
    grid.innerHTML = topicNames.map(t => {
        const m = topicMeta[t];
        return `<div class="topic-option" onclick="toggleTopic('${t}', this)">
            <input type="checkbox">
            <span class="topic-dot" style="background:${m.color};"></span>
            <span>${t}</span>
            <span class="topic-count">${m.count} Qs</span>
        </div>`;
    }).join('');
}

function toggleTopic(topic, el) {
    const idx = selectedTopics.indexOf(topic);
    if (idx >= 0) { selectedTopics.splice(idx, 1); el.classList.remove('selected'); }
    else { selectedTopics.push(topic); el.classList.add('selected'); }
    el.querySelector('input').checked = selectedTopics.includes(topic);
}

function startQuiz() {
    if (selectedTopics.length === 0) selectedTopics = [...topicNames];
    quizQs = allQuestions.filter(q => selectedTopics.includes(q.topic));
    // Sort: by topic order, then by difficulty within each topic
    const topicOrder = {};
    topicNames.forEach((t, i) => topicOrder[t] = i);
    quizQs.sort((a, b) => topicOrder[a.topic] - topicOrder[b.topic] || a.difficulty - b.difficulty);

    userAnswers = new Array(quizQs.length).fill(null);
    userFlags = new Array(quizQs.length).fill(false);
    currentQ = 0;
    submitted = false;

    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    renderQuestion();
    renderNav();
}

// =============================================
// QUESTION RENDERING
// =============================================
function renderQuestion() {
    const q = quizQs[currentQ];
    const letters = ['A','B','C','D','E'];
    const diffLabel = ['','Easy','Medium','Hard'][q.difficulty];
    const topicColor = topicMeta[q.topic].color;

    let choicesHTML = q.choices.map((c, i) => {
        let cls = '';
        if (submitted) {
            cls = 'locked ';
            if (i === q.correctIndex) cls += 'correct';
            else if (i === userAnswers[currentQ] && i !== q.correctIndex) cls += 'wrong';
        } else if (userAnswers[currentQ] === i) {
            cls = 'selected';
        }
        return `<div class="choice ${cls}" onclick="selectAnswer(${i})">
            <span class="choice-letter">${letters[i]}</span>
            <span class="choice-text">${c}</span>
        </div>`;
    }).join('');

    let feedbackHTML = '';
    if (submitted) {
        const isCorrect = userAnswers[currentQ] === q.correctIndex;
        const unanswered = userAnswers[currentQ] === null;
        let header;
        if (unanswered) header = `<strong style="color:var(--danger);">Not answered. Correct: (${letters[q.correctIndex]})</strong>`;
        else if (isCorrect) header = `<strong style="color:var(--success);">Correct!</strong>`;
        else header = `<strong style="color:var(--danger);">Incorrect. The answer is (${letters[q.correctIndex]}).</strong>`;

        feedbackHTML = `<div style="margin-top:15px;padding:15px;border-radius:8px;border:2px solid ${isCorrect && !unanswered ? 'var(--success)' : 'var(--danger)'};background:${isCorrect && !unanswered ? 'rgba(22,163,74,0.05)' : 'rgba(220,38,38,0.05)'};">
            ${header}
            <div class="step" style="margin-top:10px;">${q.explanation}</div>
            ${q.teach ? `<div class="teach"><strong>AP strategy:</strong> ${q.teach}</div>` : ''}
            ${q.gotcha ? `<div class="gotcha"><strong>Common trap:</strong> ${q.gotcha}</div>` : ''}
        </div>`;
    }

    document.getElementById('question-area').innerHTML = `
        <div class="question-card">
            <div class="q-header">
                <span class="progress">Question ${currentQ + 1} of ${quizQs.length}</span>
                <span>
                    <span class="topic-tag" style="background:${topicColor}20;color:${topicColor};">${q.topic}</span>
                    <span class="diff-badge diff-${q.difficulty}">${diffLabel}</span>
                </span>
            </div>
            <div class="question-text">${q.text}</div>
            <div class="choices">${choicesHTML}</div>
            ${feedbackHTML}
            <div class="question-controls">
                <button class="flag-btn ${userFlags[currentQ] ? 'flagged' : ''}" onclick="toggleFlag()">
                    ${userFlags[currentQ] ? '&#9873; Flagged' : '&#9872; Flag'}
                </button>
                <div class="nav-buttons">
                    ${currentQ > 0 ? '<button class="btn btn-secondary" onclick="goTo(currentQ-1)">&larr; Prev</button>' : ''}
                    ${currentQ < quizQs.length - 1 ? '<button class="btn btn-primary" onclick="goTo(currentQ+1)">Next &rarr;</button>' : ''}
                    ${!submitted ? '<button class="btn btn-primary" style="display:none;" id="mobile-submit" onclick="submitQuiz()">Submit</button>' : ''}
                </div>
            </div>
        </div>`;

    renderMathInElement(document.getElementById('question-area'), {
        delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
    });
}

function selectAnswer(i) {
    if (submitted) return;
    userAnswers[currentQ] = (userAnswers[currentQ] === i) ? null : i;
    renderQuestion();
    renderNav();
}

function toggleFlag() {
    userFlags[currentQ] = !userFlags[currentQ];
    renderQuestion();
    renderNav();
}

function goTo(idx) {
    currentQ = idx;
    renderQuestion();
    renderNav();
    window.scrollTo(0, 0);
}

// =============================================
// NAV GRID
// =============================================
function renderNav() {
    const grid = document.getElementById('nav-grid');
    grid.innerHTML = quizQs.map((q, i) => {
        let cls = '';
        if (submitted) {
            if (userAnswers[i] === q.correctIndex) cls = 'correct-dot';
            else cls = 'wrong-dot';
        } else {
            if (userFlags[i]) cls = 'flagged';
            else if (userAnswers[i] !== null) cls = 'answered';
        }
        if (i === currentQ) cls += ' current';
        return `<div class="nav-dot ${cls}" onclick="goTo(${i})">${i + 1}</div>`;
    }).join('');
}

// =============================================
// SUBMIT & RESULTS
// =============================================
function submitQuiz() {
    const unanswered = userAnswers.filter(a => a === null).length;
    if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question${unanswered > 1 ? 's' : ''}. Submit anyway?`)) return;
    submitted = true;
    renderQuestion();
    renderNav();
    showResults();
}

function showResults() {
    let correct = 0;
    const topicResults = {};
    const diffResults = {1:{c:0,t:0}, 2:{c:0,t:0}, 3:{c:0,t:0}};

    quizQs.forEach((q, i) => {
        const isRight = userAnswers[i] === q.correctIndex;
        if (isRight) correct++;
        if (!topicResults[q.topic]) topicResults[q.topic] = {correct:0, total:0};
        topicResults[q.topic].total++;
        if (isRight) topicResults[q.topic].correct++;
        diffResults[q.difficulty].t++;
        if (isRight) diffResults[q.difficulty].c++;
    });

    const pct = Math.round(correct / quizQs.length * 100);

    // Topic bars
    let topicBarsHTML = '';
    for (const t of topicNames) {
        if (!topicResults[t]) continue;
        const r = topicResults[t];
        const p = Math.round(r.correct / r.total * 100);
        const color = topicMeta[t].color;
        topicBarsHTML += `<div class="topic-bar">
            <span class="label">${t}</span>
            <span class="bar-bg"><span class="bar-fill" style="width:${p}%;background:${color};"></span></span>
            <span class="percent">${r.correct}/${r.total}</span>
        </div>`;
    }

    // Difficulty bars
    const diffLabels = {1:'Easy', 2:'Medium', 3:'Hard'};
    const diffColors = {1:'var(--success)', 2:'var(--warning)', 3:'var(--danger)'};
    let diffBarsHTML = '';
    for (const d of [1,2,3]) {
        if (diffResults[d].t === 0) continue;
        const p = Math.round(diffResults[d].c / diffResults[d].t * 100);
        diffBarsHTML += `<div class="topic-bar">
            <span class="label">${diffLabels[d]}</span>
            <span class="bar-bg"><span class="bar-fill" style="width:${p}%;background:${diffColors[d]};"></span></span>
            <span class="percent">${diffResults[d].c}/${diffResults[d].t}</span>
        </div>`;
    }

    // Missed questions list
    const letters = ['A','B','C','D','E'];
    let missedHTML = '';
    quizQs.forEach((q, i) => {
        if (userAnswers[i] === q.correctIndex) return;
        const yourAns = userAnswers[i] !== null ? `(${letters[userAnswers[i]]})` : 'No answer';
        missedHTML += `<div class="review-card">
            <div class="review-header">
                <span><strong>Q${i+1}</strong> &mdash; ${q.topic} &mdash; <span class="diff-badge diff-${q.difficulty}">${diffLabels[q.difficulty]}</span></span>
                <span class="review-result wrong">Your: ${yourAns} &nbsp; Correct: (${letters[q.correctIndex]})</span>
            </div>
            <div class="question-text" style="font-size:0.95rem;">${q.text}</div>
            <div class="step">${q.explanation}</div>
            ${q.teach ? `<div class="teach"><strong>AP strategy:</strong> ${q.teach}</div>` : ''}
            ${q.gotcha ? `<div class="gotcha"><strong>Common trap:</strong> ${q.gotcha}</div>` : ''}
        </div>`;
    });

    const div = document.getElementById('results-screen');
    div.style.display = 'block';
    div.innerHTML = `
        <div class="results-card">
            <h2>Results</h2>
            <div class="score-circle">
                <span class="score">${correct}/${quizQs.length}</span>
                <span class="total">${pct}%</span>
            </div>
        </div>
        <div class="results-grid">
            <div class="result-card"><h4>By Topic</h4>${topicBarsHTML}</div>
            <div class="result-card"><h4>By Difficulty</h4>${diffBarsHTML}</div>
        </div>
        ${missedHTML ? `<h3 style="margin:20px 0 10px;">Missed Questions (${quizQs.length - correct})</h3>${missedHTML}` : '<p style="text-align:center;color:var(--success);font-size:1.2rem;font-weight:600;margin:20px 0;">Perfect score!</p>'}
        <div style="text-align:center;margin:30px 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
            ${missedHTML ? '<button class="btn btn-primary" onclick="retryMissed()">Retry Missed</button>' : ''}
            <button class="btn btn-secondary" onclick="restartAll()">New Practice</button>
            <a href="dashboard.html" class="btn btn-secondary" style="text-decoration:none;">Dashboard</a>
        </div>`;

    renderMathInElement(div, {
        delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]
    });

    // Also scroll the quiz view to show solutions inline
    window.scrollTo(0, 0);

    // Save to history
    saveToHistory(correct, topicResults);
}

function retryMissed() {
    const missed = quizQs.filter((q, i) => userAnswers[i] !== q.correctIndex);
    quizQs = missed;
    userAnswers = new Array(quizQs.length).fill(null);
    userFlags = new Array(quizQs.length).fill(false);
    currentQ = 0;
    submitted = false;
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('results-screen').innerHTML = '';
    renderQuestion();
    renderNav();
    window.scrollTo(0, 0);
}

function restartAll() {
    selectedTopics = [];
    submitted = false;
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('results-screen').innerHTML = '';
    document.getElementById('setup-screen').style.display = 'block';
    initSetup();
}

// =============================================
// SAVE TO HISTORY
// =============================================
function saveToHistory(correct, topicResults) {
    const session = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
        date: new Date().toISOString(),
        type: 'question-bank',
        mode: 'untimed',
        mcScore: correct,
        mcTotal: quizQs.length,
        answers: [...userAnswers],
        confidence: [],
        timePerQuestion: [],
        totalTime: 0,
        flags: [...userFlags],
        errorTypes: {},
        frqResponses: [],
        frqScores: [],
        topicScores: topicResults,
        drillTopics: [...selectedTopics]
    };
    try {
        const history = JSON.parse(localStorage.getItem('apPhysicsHistory') || '{"sessions":[],"errorJournal":[],"studyLog":[]}');
        history.sessions.push(session);
        localStorage.setItem('apPhysicsHistory', JSON.stringify(history));
    } catch(e) {}
}

// =============================================
// THEME
// =============================================
function toggleTheme() {
    if (document.body.getAttribute('data-theme') === 'dark') {
        document.body.removeAttribute('data-theme');
        localStorage.setItem('apPhysicsTheme', 'light');
    } else {
        document.body.setAttribute('data-theme', 'dark');
        localStorage.setItem('apPhysicsTheme', 'dark');
    }
}
if (localStorage.getItem('apPhysicsTheme') === 'dark') document.body.setAttribute('data-theme', 'dark');

// Init
initSetup();
</script>
</body>
</html>

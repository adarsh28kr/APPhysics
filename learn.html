{
    id:'newton', name:"Newton's Laws", score:'1/6 on diagnostic',
    concept:`<h3>The Big Idea</h3>
<p>Every mechanics problem starts here: <strong>draw the Free Body Diagram, then apply $\\vec{F}_{net} = m\\vec{a}$</strong>. That's it. The entire topic is about identifying forces correctly and choosing the right sign convention.</p>
<p>Three situations cause 80% of errors:</p>
<ul style="margin-left:20px;margin-top:8px">
<li>Elevator problems (which sign for $a$?)</li>
<li>Friction on inclines (which direction does it point?)</li>
<li>Two-body systems (what's the system vs. what's internal?)</li>
</ul>`,
    tips:`<h3>Exam Tips — Newton's Laws</h3>
<ol>
<li><strong>The FBD Rule:</strong> Before writing ANY equation, draw the FBD. Label every force with its formula. No diagram = guaranteed mistakes.</li>
<li><strong>The Elevator Sanity Check:</strong> After computing tension, ask: "Am I accelerating up or down?" Going UP → feel heavier → $T > mg$. Going DOWN → feel lighter → $T < mg$. If your answer violates this, you have a sign error.</li>
<li><strong>The Friction Direction Rule:</strong> Friction opposes MOTION (or intended motion). Ask: "Which way is it sliding?" Friction points the other way. Never assume friction points down the incline.</li>
<li><strong>The System Trick:</strong> For two connected objects, first treat them as ONE system to find acceleration ($F = m_{total} \\times a$). Then isolate one object to find internal forces (tension, friction between them).</li>
<li><strong>The 3-Second Verify:</strong> After solving, check: (1) Units correct? (2) If $m \\to 0$, does answer make sense? (3) Is magnitude reasonable?</li>
</ol>`,
    formula:`$\\vec{F}_{net} = m\\vec{a}$ &nbsp;|&nbsp; $f_k = \\mu_k N$ &nbsp;|&nbsp; Elevator UP: $T = m(g+a)$ &nbsp;|&nbsp; DOWN: $T = m(g-a)$`,
    diagram:`<svg width="400" height="180" viewBox="0 0 400 180">
<rect x="10" y="170" width="380" height="2" fill="#64748b"/>
<polygon points="50,170 250,170 250,70" fill="none" stroke="#2563eb" stroke-width="2"/>
<rect x="140" y="95" width="50" height="35" fill="#dbeafe" stroke="#2563eb" stroke-width="2" transform="rotate(-26.5 165 112)"/>

<text x="110" y="78" font-size="12" fill="#16a34a">N</text>
<line x1="165" y1="112" x2="200" y2="82" stroke="#d97706" stroke-width="2" marker-end="url(#a)"/>
<text x="205" y="78" font-size="12" fill="#d97706">friction</text>

<text x="300" y="70" font-size="11" fill="#dc2626">Red = weight</text>
<text x="300" y="86" font-size="11" fill="#16a34a">Green = normal</text>
<text x="300" y="102" font-size="11" fill="#d97706">Orange = friction</text>
<defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="context-stroke"/></marker></defs>

    questions:[
    {
        text:"A 10 kg block is pushed with 50 N horizontally across a floor. Kinetic friction coefficient is 0.3. The acceleration is:",
        choices:["$2$ m/s$^2$","$5$ m/s$^2$","$2.5$ m/s$^2$","$3.5$ m/s$^2$","$8$ m/s$^2$"],
        correct:0,
        explanation:`<h4>Answer: (A) 2 m/s²</h4>
<div class="step"><strong>Step 1 — FBD</strong> <span class="tip-ref">Tip #1</span>: Applied force 50 N right. Friction $f_k = \\mu_k mg = 0.3 \\times 10 \\times 10 = 30$ N left. Weight down, normal up (cancel).</div>
<div class="step"><strong>Step 2 — Net force:</strong> $F_{net} = 50 - 30 = 20$ N right.</div>
<div class="step"><strong>Step 3 — Solve:</strong> $a = F_{net}/m = 20/10 = 2$ m/s$^2$.</div>
<div class="verify-box"><strong>Quick verify</strong> <span class="tip-ref">Tip #5</span>: If friction were zero, $a = 50/10 = 5$. With friction, $a$ must be less than 5. ✓ $2 < 5$. If applied force were zero, block decelerates at $\\mu g = 3$. Our answer is positive, meaning we're overcoming friction. ✓</div>`,
        solDiagram:`<svg width="380" height="100" viewBox="0 0 380 100"><rect x="10" y="90" width="360" height="2" fill="#94a3b8"/><rect x="130" y="50" width="70" height="40" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="165" y="75" text-anchor="middle" font-size="11" fill="#2563eb">10 kg</text><line x1="200" y1="70" x2="260" y2="70" stroke="#16a34a" stroke-width="3" marker-end="url(#a)"/><text x="235" y="62" font-size="11" fill="#16a34a" font-weight="bold">50 N</text><line x1="130" y1="70" x2="80" y2="70" stroke="#dc2626" stroke-width="3" marker-end="url(#a)"/><text x="100" y="62" font-size="11" fill="#dc2626" font-weight="bold">30 N</text><text x="100" y="45" font-size="9" fill="#dc2626">friction</text><line x1="260" y1="70" x2="330" y2="70" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/><text x="300" y="62" font-size="10" fill="#2563eb">Net: 20 N →</text><text x="300" y="45" font-size="10" fill="#2563eb">a = 20/10 = 2</text></svg>`,
        wrongWhy:`<strong>(B) 5 m/s²</strong> = forgot friction entirely (50/10). <strong>(E) 8 m/s²</strong> = subtracted friction from weight instead of from applied force.`,
        variation:{
            text:"Same block (10 kg, $\\mu_k = 0.3$) but now the applied force is only 20 N. What happens?",
            choices:["Accelerates at $1$ m/s$^2$","Doesn't move (if static)","Decelerates at $1$ m/s$^2$","Accelerates at $2$ m/s$^2$"],
            correct:1,
            explanation:"Applied force (20 N) is less than max static friction ($\\mu_s mg \\approx 30$ N assuming $\\mu_s \\geq \\mu_k = 0.3$). The block doesn't move. Friction only provides what's needed to prevent motion, up to its maximum. So $f_s = 20$ N exactly, net force = 0."
        }
    },
    {
        text:"An elevator (mass 1000 kg) accelerates upward at 3 m/s$^2$. The cable tension is:",
        choices:["$7000$ N","$10000$ N","$13000$ N","$3000$ N","$30000$ N"],
        correct:2,
        explanation:`<h4>Answer: (C) 13000 N</h4>
<div class="step"><strong>Step 1 — Identify direction:</strong> Accelerating UPWARD. <span class="tip-ref">Tip #2</span>: Going up = feel heavier = $T > mg$.</div>
<div class="step"><strong>Step 2 — Apply Newton's 2nd law:</strong> $T - mg = ma$ (taking up as positive).</div>
<div class="step"><strong>Step 3 — Solve:</strong> $T = m(g+a) = 1000(10+3) = 13000$ N.</div>
<div class="verify-box"><strong>Quick verify</strong> <span class="tip-ref">Tip #2</span>: Is $T > mg$? $13000 > 10000$ ✓. Going up, should feel heavier. If I'd gotten 7000 N ($T < mg$), that would mean the elevator accelerates DOWNWARD — wrong direction!</div>`,
        solDiagram:`<svg width="300" height="150" viewBox="0 0 300 150"><rect x="100" y="30" width="80" height="60" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="140" y="65" text-anchor="middle" font-size="11" fill="#2563eb">1000 kg</text><line x1="140" y1="30" x2="140" y2="5" stroke="#16a34a" stroke-width="3" marker-end="url(#a)"/><text x="160" y="15" font-size="12" fill="#16a34a" font-weight="bold">T = 13000 N</text><line x1="140" y1="90" x2="140" y2="130" stroke="#dc2626" stroke-width="3" marker-end="url(#a)"/><text x="160" y="125" font-size="12" fill="#dc2626" font-weight="bold">mg = 10000 N</text><line x1="230" y1="70" x2="230" y2="40" stroke="#8b5cf6" stroke-width="2" marker-end="url(#a)"/><text x="250" y="50" font-size="11" fill="#8b5cf6">a = 3 ↑</text><text x="250" y="90" font-size="10" fill="#64748b">T > mg ✓</text><text x="250" y="105" font-size="10" fill="#64748b">(going up =</text><text x="250" y="118" font-size="10" fill="#64748b">feel heavier)</text></svg>`,
        wrongWhy:`<strong>(A) 7000 N</strong> = used $m(g-a)$ — that's for accelerating DOWN. The sign error! <strong>(B) 10000 N</strong> = weight only, no acceleration ($a=0$). <strong>(D) 3000 N</strong> = computed $ma$ only, forgetting to add $mg$.`,
        variation:{

            choices:["$13000$ N","$7000$ N","$10000$ N","$3000$ N"],
            correct:1,
            explanation:"Now going DOWN → feel lighter → $T < mg$. $T = m(g - a) = 1000(10-3) = 7000$ N. Check: $7000 < 10000$ ✓. Notice: 7000 is exactly the answer you'd get WRONG on the upward problem. The sign switches!"
        }

    {
        text:"A 4 kg block sits on a 6 kg block on a frictionless floor. $\\mu_s = 0.5$ between blocks. Maximum force on the BOTTOM block so the top doesn't slide?",
        choices:["$20$ N","$30$ N","$50$ N","$40$ N","$80$ N"],
        correct:2,
        explanation:`<h4>Answer: (C) 50 N</h4>
<div class="step"><strong>Step 1 — System trick</strong> <span class="tip-ref">Tip #4</span>: First find max acceleration. The top block is accelerated by friction only: $f_{max} = \\mu_s m_{top} g = 0.5 \\times 4 \\times 10 = 20$ N.</div>
<div class="step"><strong>Step 2 — Max acceleration:</strong> $a_{max} = f_{max}/m_{top} = 20/4 = 5$ m/s$^2$.</div>
<div class="step"><strong>Step 3 — System force:</strong> $F = m_{total} \\times a_{max} = (4+6) \\times 5 = 50$ N.</div>
<div class="verify-box"><strong>Quick verify</strong> <span class="tip-ref">Tip #5</span>: $F$ must accelerate 10 kg at 5 m/s² = 50 N ✓. Also: $F$ should be larger than the friction force (20 N) since it moves the WHOLE system ✓.</div>`,
        solDiagram:`<svg width="380" height="110" viewBox="0 0 380 110"><rect x="10" y="100" width="360" height="2" fill="#94a3b8"/><rect x="120" y="55" width="80" height="45" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="160" y="82" text-anchor="middle" font-size="10" fill="#d97706">6 kg (bottom)</text><rect x="135" y="20" width="50" height="35" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="160" y="42" text-anchor="middle" font-size="10" fill="#2563eb">4 kg (top)</text><line x1="200" y1="78" x2="270" y2="78" stroke="#16a34a" stroke-width="3" marker-end="url(#a)"/><text x="240" y="70" font-size="10" fill="#16a34a" font-weight="bold">F = 50 N</text><line x1="135" y1="38" x2="185" y2="38" stroke="#dc2626" stroke-width="2" marker-end="url(#a)"/><text x="210" y="35" font-size="9" fill="#dc2626">f = 20 N max</text><text x="270" y="100" font-size="9" fill="#64748b">a_max = 20/4 = 5 m/s²</text><text x="270" y="112" font-size="9" fill="#64748b">F = 10 × 5 = 50 N</text></svg>`,
        wrongWhy:`<strong>(A) 20 N</strong> = the friction force itself — but $F$ pushes 10 kg, not 4 kg! <strong>(B) 30 N</strong> = multiplied friction by bottom mass only ($6 \\times 5$). <strong>(D) 40 N</strong> = used $F = \\mu_s (m_1 + m_2) g$ which is wrong.`,
        variation:{
            text:"Now the force is applied to the TOP block instead. Maximum force so the bottom block doesn't get left behind?",

        }
    }

// TOPIC 2: MOMENTUM

{
    id:'momentum', name:'Momentum', score:'1/6 on diagnostic',
    concept:`<h3>The Big Idea</h3>
<p><strong>Momentum ($\\vec{p} = m\\vec{v}$) is a vector</strong> and is conserved when no external forces act. The #1 thing to get right: <strong>which type of collision is this?</strong></p>
<ul style="margin-left:20px;margin-top:8px">
<li><strong>Perfectly inelastic</strong> (stick together): Only conserve $p$. One equation, easy.</li>
<li><strong>Perfectly elastic</strong> (bounce): Conserve $p$ AND $KE$. Use the shortcut formula.</li>
</ul>
<p style="margin-top:10px">And remember: <strong>momentum is a vector</strong>. Perpendicular momenta combine with Pythagorean theorem, never by adding.</p>`,
    tips:`<h3>Exam Tips — Momentum</h3>
<ol>
<li><strong>The Collision Decision Tree:</strong> Read the problem. "Stick together" / "embed" / "couple" → INELASTIC. "Bounce" / "elastic" / "rebound" → ELASTIC. Wrong formula = wrong answer guaranteed.</li>
<li><strong>The Elastic Shortcut:</strong> For elastic collisions with one object at rest: $v_1' = \\frac{m_1-m_2}{m_1+m_2}v_1$. Negative result = bounces back. Memorize this — it saves 3 minutes of algebra.</li>
<li><strong>The Vector Rule:</strong> If momenta are at 90°, ALWAYS draw the right triangle. $|p_{total}| = \\sqrt{p_x^2 + p_y^2}$. NEVER add them directly.</li>
<li><strong>The Rocket Formula:</strong> $\\Delta v = v_e \\ln(M_0/M_f)$. If half the mass is expelled: $\\Delta v = v_e \\ln 2 \\approx 0.693 v_e$. If 2/3 expelled (mass goes to 1/3): $\\Delta v = v_e \\ln 3 \\approx 1.1 v_e$.</li>
<li><strong>The Limiting Case Check:</strong> In elastic collision, if $m_1 = m_2$: first ball stops, second moves at $v_1$. If $m_1 \\ll m_2$: first ball bounces back at nearly $v_1$. Check your formula against these.</li>
</ol>`,
    formula:`Inelastic: $m_1v_1 + m_2v_2 = (m_1+m_2)v_f$ &nbsp;|&nbsp; Elastic: $v_1' = \\frac{m_1-m_2}{m_1+m_2}v_1$ &nbsp;|&nbsp; Rocket: $\\Delta v = v_e\\ln(M_0/M_f)$`,

<p>Kinematics is about <strong>when to use calculus vs. when to use kinematic equations</strong>. This is the defining skill of AP Physics C.</p>

<li><strong>Variable $a(t)$:</strong> MUST integrate: $v = \\int a\\,dt$, $x = \\int v\\,dt$</li>

<p style="margin-top:10px">The other big trap: <strong>energy and speed are related by $v^2$, not $v$</strong>. Half the speed = quarter the KE, not half.</p>`,

<ol>
<li><strong>The Calculus Test:</strong> Look at $a(t)$. Is it constant (just a number)? → kinematic equations. Does it depend on $t$? → MUST integrate. Using $v = v_0 + at$ for variable $a$ is the #1 calculus trap.</li>
<li><strong>The Max Velocity Trick:</strong> Velocity is maximum when $a = 0$ (acceleration changes sign). Set $a(t) = 0$, solve for $t$, then integrate $v = \\int_0^{t_{max}} a\\,dt$.</li>

        explanation:`<h4>Answer: (A) $3v_0^2/(8g)$</h4>
<div class="step"><strong>Step 1 — Energy approach</strong> <span class="tip-ref">Tip #3</span>: Lost 75% of KE → 25% remains. $\\frac{1}{2}mv^2 = \\frac{1}{4} \\times \\frac{1}{2}mv_0^2$.</div>
<div class="step"><strong>Step 2 — Find speed:</strong> $v^2 = v_0^2/4 \\Rightarrow v = v_0/2$. (Half the speed = quarter the KE — the $v^2$ rule!)</div>
<div class="step"><strong>Step 3 — Use kinematics:</strong> $v^2 = v_0^2 - 2gh \\Rightarrow v_0^2/4 = v_0^2 - 2gh \\Rightarrow 2gh = 3v_0^2/4 \\Rightarrow h = 3v_0^2/(8g)$</div>
<div class="verify-box"><strong>Quick verify:</strong> At max height $H = v_0^2/(2g)$, lost 100% of KE. Our answer: $3v_0^2/(8g) = \\frac{3}{4}H$. Losing 75% of KE puts us at 3/4 of max height ✓. Makes sense — most of the KE is used up in the lower portion (because $v$ is still high there).</div>`,
        wrongWhy:`<strong>(D) $3v_0^2/(4g)$</strong> = forgot the $\\frac{1}{2}$ factor ($2gh = 3v_0^2/4$ but then $h = 3v_0^2/(8g)$, not $3v_0^2/(4g)$). <strong>(E) $v_0^2/(4g)$</strong> = assumed 75% KE lost means 75% of height. Wrong — KE goes as $v^2$!`,
        variation:{
            text:"At what height has the ball lost 50% of its KE?",
            choices:["$v_0^2/(4g)$ = half the max height","$v_0^2/(8g)$","$v_0^2/(2g)$","$3v_0^2/(8g)$"],
            correct:0,
            explanation:"50% KE lost → 50% remains → $v^2 = v_0^2/2$. $v_0^2/2 = v_0^2 - 2gh → 2gh = v_0^2/2 → h = v_0^2/(4g)$. That's exactly half the max height. So 50% energy loss = 50% of height. But 75% energy loss = 75% of height. It's linear! The relationship between energy fraction lost and height fraction is always equal because $PE = mgh$ is linear in $h$."
        }
    }
    ]
}
];

// ============================================
// RENDERING
// ============================================
let currentTopic = 0;
let answered = {};

function renderTopicNav() {
    document.getElementById('topic-nav').innerHTML = topics.map((t,i) =>
        `<button class="topic-btn ${i===currentTopic?'active':''}" onclick="switchTopic(${i})">${t.name}</button>`
    ).join('');
}

function switchTopic(i) {
    currentTopic = i;
    renderTopicNav();
    renderTopic();
    window.scrollTo({top:0,behavior:'smooth'});
}

function renderTopic() {
    const t = topics[currentTopic];
    const letters = ['A','B','C','D','E'];

    let qHTML = t.questions.map((q,qi) => {
        const qid = t.id+'_'+qi;
        const done = answered[qid] !== undefined;

        let choicesStr = q.choices.map((c,ci) => {
            let cls = '';
            if (done) {
                if (ci === q.correct) cls = 'correct';
                else if (ci === answered[qid]) cls = 'wrong';
                else cls = 'dim';
            }
            return `<div class="choice ${cls}" onclick="answerQ('${qid}',${ci},${q.correct})">
                <span class="choice-letter">${letters[ci]}</span>
                <span class="choice-text">${c}</span>
            </div>`;
        }).join('');

        let expCls = done ? (answered[qid]===q.correct ? 'show is-correct':'show is-wrong') : '';

        // Variation
        let varHTML = '';
        if (q.variation && done) {
            const vid = qid+'_var';
            const vdone = answered[vid] !== undefined;
            let vChoicesStr = q.variation.choices.map((vc,vci) => {
                let vcls = '';
                if (vdone) {
                    if (vci === q.variation.correct) vcls = 'correct';
                    else if (vci === answered[vid]) vcls = 'wrong';
                    else vcls = 'dim';
                }
                return `<div class="choice ${vcls}" onclick="answerQ('${vid}',${vci},${q.variation.correct})">
                    <span class="choice-letter">${letters[vci]}</span>
                    <span class="choice-text">${vc}</span>
                </div>`;
            }).join('');
            let vExpCls = vdone ? 'show' : '';
            varHTML = `<div class="variation-box">
                <h4>Try a Similar Problem</h4>
                <div class="v-text">${q.variation.text}</div>
                <div class="v-choices">${vChoicesStr}</div>
                <div class="var-explanation ${vExpCls}" id="vexp_${vid}">${q.variation.explanation}</div>
            </div>`;
        }

        return `<div class="question">
            <div class="q-label">Practice ${qi+1}</div>
            <div class="q-text">${q.text}</div>
            <div class="choices">${choicesStr}</div>
            <div class="explanation ${expCls}" id="exp_${qid}">
                ${q.explanation}
                ${q.solDiagram ? '<div class="diagram" style="margin:12px 0">'+q.solDiagram+'</div>' : ''}
                <div class="wrong-why"><strong>Why wrong answers are wrong:</strong><br>${q.wrongWhy}</div>
            </div>
            ${varHTML}
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        <div class="topic-section active">
            <h2 class="topic-title">${t.name}</h2>
            <div class="topic-score">Diagnostic: ${t.score}</div>
            <div class="concept-box">${t.concept}</div>
            <div class="tips-box">${t.tips}</div>
            <div class="formula-box"><div class="label">Key Formulas</div>${t.formula}</div>
            <div class="diagram">${t.diagram}</div>
            ${qHTML}
            <div style="text-align:center;margin-top:25px">
                ${currentTopic < topics.length-1 ? `<button class="topic-btn" onclick="switchTopic(${currentTopic+1})" style="padding:12px 30px;font-size:1rem">Next: ${topics[currentTopic+1].name} →</button>` : '<p style="color:var(--success);font-weight:bold;font-size:1.1rem">All topics reviewed! Now take Practice Exam #2.</p>'}
            </div>
        </div>`;

    renderMathInElement(document.getElementById('content'), {delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});
    updateProgress();
}

function answerQ(qid, chosen, correct) {
    if (answered[qid] !== undefined) return;
    answered[qid] = chosen;
    renderTopic();
    setTimeout(() => {
        const el = document.getElementById('exp_'+qid) || document.getElementById('vexp_'+qid);
        if (el) el.scrollIntoView({behavior:'smooth',block:'center'});
    }, 100);
}

function updateProgress() {
    let total = 0, done = 0;
    topics.forEach(t => { t.questions.forEach((q,qi) => {
        total++; if (answered[t.id+'_'+qi] !== undefined) done++;
        if (q.variation) { total++; if (answered[t.id+'_'+qi+'_var'] !== undefined) done++; }
    });});
    document.getElementById('progress-fill').style.width = Math.round(done/total*100)+'%';
}

function toggleTheme() {
    document.body.getAttribute('data-theme')==='dark' ?
        (document.body.removeAttribute('data-theme'),localStorage.setItem('apPhysicsTheme','light')) :
        (document.body.setAttribute('data-theme','dark'),localStorage.setItem('apPhysicsTheme','dark'));
}
if (localStorage.getItem('apPhysicsTheme')==='dark') document.body.setAttribute('data-theme','dark');

renderTopicNav();
renderTopic();
</script>
</body>
</html>

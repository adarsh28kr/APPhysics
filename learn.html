        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#f8fafc;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#d97706;--concept:#eff6ff;--formula:#f0fdf4}

        .container{max-width:820px;margin:0 auto}
        h1{font-size:1.8rem;text-align:center;margin-bottom:5px}
        .subtitle{text-align:center;color:var(--text2);margin-bottom:10px;font-size:.95rem}
        .nav{text-align:center;font-size:.85rem;margin-bottom:25px}
        .nav a{color:var(--primary);text-decoration:none;margin:0 8px}

        /* Topic nav */
        .topic-nav{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:30px}
        .topic-btn{padding:8px 16px;border:2px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);cursor:pointer;font-size:.85rem;font-weight:600;transition:.2s}
        .topic-btn:hover,.topic-btn.active{border-color:var(--primary);color:var(--primary);background:var(--concept)}

        /* Topic sections */
        .topic-section{display:none;margin-bottom:40px}
        .topic-section.active{display:block}
        .topic-title{font-size:1.4rem;color:var(--primary);margin-bottom:5px;border-bottom:3px solid var(--primary);padding-bottom:8px}
        .topic-score{font-size:.85rem;color:var(--danger);margin-bottom:15px}

        /* Concept box */
        .concept-box{background:var(--concept);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:20px;font-size:1rem}
        .concept-box h3{color:var(--primary);margin-bottom:10px;font-size:1.05rem}

        /* Formula box */
        .formula-box{background:var(--formula);border:2px solid var(--success);border-radius:10px;padding:16px 20px;margin:15px 0;text-align:center;font-size:1.1rem}
        .formula-box .label{font-size:.75rem;color:var(--success);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}

        /* Diagram */
        .diagram{text-align:center;margin:18px 0;padding:15px;background:var(--card);border:1px solid var(--border);border-radius:10px}
        .diagram svg{max-width:100%;height:auto}

        /* Question */
        .question{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px}
        .q-label{font-size:.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
        .q-text{font-size:1.05rem;margin-bottom:18px;line-height:1.8}
        .choices{list-style:none}
        .choice{display:flex;align-items:flex-start;padding:10px 14px;margin-bottom:6px;border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:.15s;font-size:.95rem}
        .choice:hover{border-color:var(--primary);background:rgba(37,99,235,.04)}
        .choice.selected{border-color:var(--primary);background:rgba(37,99,235,.08)}
        .choice.correct{border-color:var(--success);background:rgba(22,163,74,.08)}
        .choice.wrong{border-color:var(--danger);background:rgba(220,38,38,.06)}
        .choice-letter{font-weight:700;margin-right:10px;min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#e5e7eb;font-size:.8rem}
        [data-theme="dark"] .choice-letter{background:#2a2a4a}
        .choice.correct .choice-letter{background:var(--success);color:#fff}
        .choice.wrong .choice-letter{background:var(--danger);color:#fff}
        .choice-text{flex:1}

        /* Explanation */
        .explanation{display:none;margin-top:15px;padding:18px;border-radius:10px;font-size:.95rem;line-height:1.8}
        .explanation.show{display:block}
        .explanation.is-correct{background:#f0fdf4;border:2px solid var(--success)}
        .explanation.is-wrong{background:#fef2f2;border:2px solid var(--danger)}
        [data-theme="dark"] .explanation.is-correct{background:#14532d}
        [data-theme="dark"] .explanation.is-wrong{background:#450a0a}
        .explanation h4{margin-bottom:8px}
        .explanation .step{margin-bottom:6px;padding-left:8px;border-left:3px solid var(--primary)}
        .explanation .wrong-why{margin-top:12px;padding:10px 14px;background:rgba(220,38,38,.05);border-radius:6px;font-size:.88rem}
        .explanation .wrong-why strong{color:var(--danger)}

        .theme-toggle{position:fixed;bottom:20px;right:20px;padding:10px;border-radius:50%;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:1.2rem;z-index:100}
        .progress-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
        .progress-fill{height:100%;background:var(--success);border-radius:2px;transition:width .3s}
    </style>

    concept: `<h3>The Big Idea</h3>
<p>Newton's Laws are about <strong>forces and motion</strong>. The key skill is drawing a <strong>Free Body Diagram (FBD)</strong> — identifying every force on an object, then applying $\\vec{F}_{net} = m\\vec{a}$.</p>
<p><strong>Three things students get wrong most:</strong></p>
<ul style="margin-left:20px;margin-top:8px;">
<li><strong>Friction direction:</strong> Friction OPPOSES the direction of motion (or intended motion). Block slides down → friction points up.</li>
<li><strong>Elevator tension:</strong> Going up → you feel heavier → $T = m(g+a)$. Going down → you feel lighter → $T = m(g-a)$.</li>
<li><strong>Horizontal force on incline:</strong> A horizontal force must be decomposed into components parallel and perpendicular to the incline surface.</li>
</ul>`,
    formula: `$\\vec{F}_{net} = m\\vec{a}$ &nbsp;&nbsp;|&nbsp;&nbsp; $f_k = \\mu_k N$ &nbsp;&nbsp;|&nbsp;&nbsp; Elevator: $T = m(g \\pm a)$`,

        {
            text: "A 10 kg block is pushed across a floor with a horizontal force of 50 N. The coefficient of kinetic friction is 0.3. The acceleration of the block is:",
            choices: ["$2$ m/s$^2$","$5$ m/s$^2$","$3$ m/s$^2$","$0.5$ m/s$^2$","$8$ m/s$^2$"],
            correct: 0,
            explanation: `<h4>Answer: (A) 2 m/s²</h4>
<div class="step"><strong>Step 1:</strong> Identify forces. Applied force $F = 50$ N forward. Friction $f_k = \\mu_k mg = 0.3 \\times 10 \\times 10 = 30$ N backward.</div>
<div class="step"><strong>Step 2:</strong> Net force: $F_{net} = 50 - 30 = 20$ N</div>
<div class="step"><strong>Step 3:</strong> $a = F_{net}/m = 20/10 = 2$ m/s$^2$</div>`,

<div class="step"><strong>Step 2:</strong> Taking down as positive (direction of acceleration): $mg - T = ma$</div>
<div class="step"><strong>Step 3:</strong> $T = m(g - a) = 800(10 - 2) = 800 \\times 8 = 6400$ N</div>
<div class="step"><strong>Check:</strong> Accelerating DOWN → should feel lighter → $T < mg = 8000$ N. ✓ $6400 < 8000$.</div>`,

<div class="step"><strong>Step 2:</strong> This friction is the only force accelerating the top block, so: $a_{max} = 12/3 = 4$ m/s$^2$</div>
<div class="step"><strong>Step 3:</strong> Both blocks must accelerate at 4 m/s$^2$ together. Total mass = 8 kg: $F = 8 \\times 4 = 32$ N</div>
<div class="step"><strong>Key insight:</strong> $F$ pushes the ENTIRE system (8 kg), not just the top block. The friction limit determines the max acceleration, then $F = (m_1 + m_2) \\times a_{max}$.</div>`,

<p><strong>Momentum is a vector</strong> ($\\vec{p} = m\\vec{v}$) and it's conserved when no external forces act. The two collision types are fundamentally different:</p>
<ul style="margin-left:20px;margin-top:8px;">
<li><strong>Perfectly inelastic</strong> (stick together): Conserve momentum only. $m_1 v_1 + m_2 v_2 = (m_1+m_2)v_f$</li>
<li><strong>Perfectly elastic</strong> (bounce): Conserve momentum AND kinetic energy. Use: $v_1' = \\frac{m_1-m_2}{m_1+m_2}v_1$</li>
</ul>
<p style="margin-top:10px;"><strong>Critical mistake to avoid:</strong> When momenta are perpendicular, use the <strong>Pythagorean theorem</strong>, NOT simple addition. $|\\vec{p}_{total}| = \\sqrt{p_x^2 + p_y^2}$, NOT $p_x + p_y$.</p>`,

    questions: [
        {
            text: "A 3 kg ball moving at 8 m/s collides head-on with a 5 kg ball at rest. The collision is perfectly elastic. The velocity of the 3 kg ball after the collision is:",

            explanation: `<h4>Answer: (A) -2 m/s (bounces back)</h4>

<div class="step"><strong>Step 2:</strong> $v_1' = \\frac{3-5}{3+5} \\times 8 = \\frac{-2}{8} \\times 8 = -2$ m/s</div>

        {
            text: "A 2 kg object moves east at 6 m/s and a 3 kg object moves north at 4 m/s. They collide and stick together. The speed of the combined object is:",

// ============================================
// RENDERING
// ============================================
let currentTopic = 0;
let answered = {};

function renderTopicNav() {
    const nav = document.getElementById('topic-nav');
    nav.innerHTML = topics.map((t, i) =>
        `<button class="topic-btn ${i===currentTopic?'active':''}" onclick="switchTopic(${i})">${t.name}</button>`
    ).join('');
}

function switchTopic(i) {
    currentTopic = i;
    renderTopicNav();
    renderTopic();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderTopic() {
    const t = topics[currentTopic];
    const content = document.getElementById('content');

    let questionsHTML = t.questions.map((q, qi) => {
        const qid = t.id + '_' + qi;
        const hasAnswered = answered[qid] !== undefined;
        const letters = ['A','B','C','D','E'];

        let choicesHTML = q.choices.map((c, ci) => {
            let cls = '';
            if (hasAnswered) {
                if (ci === q.correct) cls = 'correct';
                else if (ci === answered[qid] && ci !== q.correct) cls = 'wrong';
            }
            return `<div class="choice ${cls}" onclick="answerQ('${qid}',${ci},${q.correct})" style="${hasAnswered?'pointer-events:none':''}">
                <span class="choice-letter">${letters[ci]}</span>
                <span class="choice-text">${c}</span>
            </div>`;
        }).join('');

        let expClass = '';
        if (hasAnswered) expClass = answered[qid] === q.correct ? 'show is-correct' : 'show is-wrong';

        return `<div class="question">
            <div class="q-label">Practice Question ${qi+1}</div>
            <div class="q-text">${q.text}</div>
            <div class="choices">${choicesHTML}</div>
            <div class="explanation ${expClass}" id="exp_${qid}">
                ${q.explanation}
                <div class="wrong-why"><strong>Why wrong answers are wrong:</strong><br>${q.wrongWhy}</div>
            </div>
        </div>`;
    }).join('');

    content.innerHTML = `
        <div class="topic-section active">
            <h2 class="topic-title">${t.name}</h2>
            <div class="topic-score">Diagnostic score: ${t.score}</div>
            <div class="concept-box">${t.concept}</div>
            <div class="formula-box"><div class="label">Key Formulas</div>${t.formula}</div>
            <div class="diagram">${t.diagram}</div>
            ${questionsHTML}
            <div style="text-align:center;margin-top:20px;">
                ${currentTopic < topics.length-1 ? `<button class="topic-btn" onclick="switchTopic(${currentTopic+1})" style="padding:12px 30px;font-size:1rem;">Next Topic: ${topics[currentTopic+1].name} →</button>` : '<p style="color:var(--success);font-weight:bold;font-size:1.1rem;">All topics reviewed! Now take Practice Exam #2.</p>'}
            </div>
        </div>
    `;

    renderMathInElement(content, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}] });
    updateProgress();
}

function answerQ(qid, chosen, correct) {
    if (answered[qid] !== undefined) return;
    answered[qid] = chosen;
    renderTopic();
    // Scroll to explanation
    setTimeout(() => {
        const exp = document.getElementById('exp_' + qid);
        if (exp) exp.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
}

function updateProgress() {
    const totalQs = topics.reduce((s,t) => s + t.questions.length, 0);
    const answeredCount = Object.keys(answered).length;
    document.getElementById('progress-fill').style.width = Math.round(answeredCount/totalQs*100) + '%';
}

function toggleTheme() {
    document.body.getAttribute('data-theme')==='dark' ?
        (document.body.removeAttribute('data-theme'), localStorage.setItem('apPhysicsTheme','light')) :
        (document.body.setAttribute('data-theme','dark'), localStorage.setItem('apPhysicsTheme','dark'));
}
if (localStorage.getItem('apPhysicsTheme')==='dark') document.body.setAttribute('data-theme','dark');

// Init
renderTopicNav();
renderTopic();
</script>
